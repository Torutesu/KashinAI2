name: Deploy

# Continuous deployment to Fly.io. Runs ONLY after the CI workflow succeeds on
# main, so broken code never reaches production. Requires a FLY_API_TOKEN repo
# secret (create with `fly tokens create deploy`).

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

# Never run two production deploys at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy only when the triggering CI run passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
