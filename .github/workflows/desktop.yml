name: Desktop (macOS)

# Build the macOS desktop app. Runs on a version tag or manually. The artifact
# is UNSIGNED — add APPLE_CERTIFICATE / notarization secrets and the matching
# tauri signing config to distribute outside your own machine.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        working-directory: desktop
        run: npm install

      - name: Generate app icons
        working-directory: desktop
        run: npm run icon

      - name: Bundle engine + build app
        working-directory: desktop
        run: npm run build
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: KashinAI2-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Attach to release (tags only, best-effort)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" desktop/src-tauri/target/release/bundle/dmg/*.dmg --clobber || true
