<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KashinAI2 Dashboard</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #262b36; --text: #e6e9ef;
    --muted: #9aa4b2; --accent: #4f9eff; --ok: #3fb950; --bad: #f85149;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f8fa; --panel: #ffffff; --border: #d0d7de; --text: #1f2328;
      --muted: #59636e; --accent: #0969da; --ok: #1a7f37; --bad: #cf222e;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; }
  header .ver { color: var(--muted); font-size: 12px; }
  .pill { margin-left: auto; padding: 4px 10px; border-radius: 999px; font-size: 12px;
    font-weight: 600; border: 1px solid var(--border); }
  .pill.ok { color: var(--ok); border-color: var(--ok); }
  .pill.bad { color: var(--bad); border-color: var(--bad); }
  main { max-width: 1000px; margin: 0 auto; padding: 20px; display: grid; gap: 16px;
    grid-template-columns: 1fr 1fr; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; overflow: hidden; }
  .panel.wide { grid-column: 1 / -1; }
  .panel h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .metric .n { font-size: 22px; font-weight: 700; }
  .metric .k { color: var(--muted); font-size: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border);
    font-size: 13px; vertical-align: top; }
  th { color: var(--muted); font-weight: 600; }
  td.type { color: var(--accent); white-space: nowrap; }
  .search { display: flex; gap: 8px; margin-bottom: 12px; }
  .search input { flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 10px; outline: none; }
  .search button { background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 8px 16px; cursor: pointer; font-weight: 600; }
  .muted { color: var(--muted); }
  .overflow { overflow-x: auto; }
  .tokenInput { margin-left: auto; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 12px; width: 220px; outline: none; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .row input { flex: 1; min-width: 180px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 8px 10px; outline: none; }
  button.act { background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 7px 14px; cursor: pointer; font-weight: 600; font-size: 13px; }
  button.danger { background: transparent; color: var(--bad); border: 1px solid var(--bad);
    border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .note { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .ok-text { color: var(--ok); font-size: 12px; }
  @media (max-width: 720px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1>KashinAI2</h1>
  <span class="ver" id="version">—</span>
  <input id="token" class="tokenInput" type="password" placeholder="API token (for management)" />
  <span class="pill" id="ready">checking…</span>
</header>
<main>
  <section class="panel">
    <h2>Metrics</h2>
    <div class="metrics" id="metrics"><span class="muted">Loading…</span></div>
  </section>

  <section class="panel">
    <h2>Semantic search</h2>
    <div class="search">
      <input id="q" placeholder="Search your memory…" />
      <button id="go">Search</button>
    </div>
    <div class="overflow"><table id="searchResults"><tbody></tbody></table></div>
  </section>

  <section class="panel">
    <h2>Privacy — pause capture for apps</h2>
    <div class="row">
      <input id="privacy" placeholder="e.g. 1Password,Bitwarden,Keychain" />
      <button class="act" id="savePrivacy">Save</button>
    </div>
    <div class="note" id="privacyNote">Comma-separated app names. Requires token.</div>
  </section>

  <section class="panel">
    <h2>Memory — clear a source</h2>
    <div class="chips" id="clearChips"></div>
    <div class="note" id="clearNote">Deletes SQLite rows + vectors for that source. Requires token.</div>
  </section>

  <section class="panel wide">
    <h2>Recent activity</h2>
    <div class="overflow">
      <table id="recent"><thead><tr><th>Source</th><th>Detail</th></tr></thead><tbody></tbody></table>
    </div>
  </section>

  <section class="panel wide">
    <h2>Action history</h2>
    <div class="overflow">
      <table id="actions"><thead><tr><th>When</th><th>Tool</th><th>Result</th><th>Device</th></tr></thead><tbody></tbody></table>
    </div>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  // Always attach the token if present, so the dashboard also works when the
  // backend is publicly exposed with REQUIRE_AUTH_ALL.
  async function j(url, opts) {
    const o = opts || {};
    o.headers = authHeaders(o.headers);
    const r = await fetch(url, o);
    return r.ok ? r.json() : null;
  }

  // --- token (stored locally, sent on management calls) ---
  const tokenEl = $('token');
  tokenEl.value = localStorage.getItem('kashinaiToken') || '';
  tokenEl.addEventListener('change', () => {
    localStorage.setItem('kashinaiToken', tokenEl.value.trim());
    refreshManagement();
  });
  function authHeaders(extra) {
    const t = (tokenEl.value || '').trim();
    return Object.assign({}, extra || {}, t ? { 'x-api-token': t } : {});
  }
  async function authJson(url, opts) {
    const o = opts || {};
    o.headers = authHeaders(o.headers);
    const r = await fetch(url, o);
    return r.ok ? r.json() : null;
  }

  async function refreshStatus() {
    try {
      const v = await j('/version');
      if (v) $('version').textContent = 'v' + v.version;
    } catch {}
    try {
      const r = await fetch('/ready');
      const el = $('ready');
      if (r.ok) { el.textContent = 'ready'; el.className = 'pill ok'; }
      else { el.textContent = 'not ready'; el.className = 'pill bad'; }
    } catch { $('ready').textContent = 'offline'; $('ready').className = 'pill bad'; }
  }

  async function refreshMetrics() {
    try {
      const r = await fetch('/metrics', { headers: authHeaders() });
      const text = r.ok ? await r.text() : '';
      const rows = text.trim().split('\n').filter(Boolean).map((l) => l.split(' '));
      const box = $('metrics');
      if (!rows.length) { box.innerHTML = '<span class="muted">No metrics yet.</span>'; return; }
      box.innerHTML = rows.map(([k, n]) =>
        `<div class="metric"><div class="n">${n ?? '0'}</div><div class="k">${k}</div></div>`
      ).join('');
    } catch {}
  }

  function esc(s) { return String(s ?? '').replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  async function refreshRecent() {
    const ctx = await j('/context/recent?limit=8');
    const tb = $('recent').querySelector('tbody');
    if (!ctx) { tb.innerHTML = '<tr><td colspan="2" class="muted">Unavailable.</td></tr>'; return; }
    const rows = [];
    const push = (src, detail) => detail && rows.push(`<tr><td class="type">${src}</td><td>${esc(detail)}</td></tr>`);
    (ctx.recentApps || []).slice(0, 2).forEach((a) => push('App', `${a.app} — ${a.window || ''}`));
    (ctx.recentBrowser || []).slice(0, 2).forEach((b) => push('Browser', b.title));
    (ctx.recentSelectedText || []).slice(0, 1).forEach((s) => push('Selected', s.text));
    (ctx.recentVSCode || []).slice(0, 1).forEach((v) => push('VS Code', v.workspace));
    (ctx.recentSlack || []).slice(0, 2).forEach((s) => push('Slack', s.text));
    (ctx.recentOCR || []).slice(0, 1).forEach((o) => push('Screen', (o.text || '').slice(0, 160)));
    tb.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="2" class="muted">No activity yet.</td></tr>';
  }

  async function search() {
    const q = $('q').value.trim();
    const tb = $('searchResults').querySelector('tbody');
    if (!q) { tb.innerHTML = ''; return; }
    tb.innerHTML = '<tr><td class="muted">Searching…</td></tr>';
    const res = await j('/memory/search?query=' + encodeURIComponent(q));
    const matches = (res && res.semanticMatches) || [];
    tb.innerHTML = matches.length
      ? matches.map((m) => `<tr><td class="type">${esc(m.type)}</td><td>${esc(m.text)}</td></tr>`).join('')
      : '<tr><td class="muted">No matches.</td></tr>';
  }

  $('go').addEventListener('click', search);
  $('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') search(); });

  // --- management (token-gated) ---
  const SOURCES = ['CLIPBOARD','BROWSER','SELECTED_TEXT','SLACK','CALENDAR','APP_ACTIVITY','VSCODE','OCR'];

  async function refreshPrivacy() {
    const p = await authJson('/settings/privacy');
    if (p) $('privacy').value = p.captureExcludeApps || '';
  }
  $('savePrivacy').addEventListener('click', async () => {
    const res = await authJson('/settings/privacy', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ captureExcludeApps: $('privacy').value.trim() }),
    });
    $('privacyNote').innerHTML = res ? '<span class="ok-text">Saved.</span>' : 'Save failed (check token).';
  });

  function renderClearChips() {
    $('clearChips').innerHTML = SOURCES.map((s) => `<button class="danger" data-src="${s}">Clear ${s}</button>`).join('');
    document.querySelectorAll('#clearChips button').forEach((b) => b.addEventListener('click', async () => {
      const src = b.getAttribute('data-src');
      if (!confirm(`Delete all ${src} memory?`)) return;
      const res = await authJson('/memory/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source: src }),
      });
      $('clearNote').innerHTML = res
        ? `<span class="ok-text">Cleared ${src}: ${res.deleted} rows, ${res.vectorsDeleted} vectors.</span>`
        : 'Clear failed (check token).';
      refreshRecent();
    }));
  }

  async function refreshActions() {
    const data = await authJson('/actions/history');
    const tb = $('actions').querySelector('tbody');
    if (!data) { tb.innerHTML = '<tr><td colspan="4" class="muted">Enter a token to view.</td></tr>'; return; }
    const rows = (data.actions || []);
    tb.innerHTML = rows.length
      ? rows.map((a) => `<tr><td>${new Date(a.at).toLocaleTimeString()}</td><td class="type">${esc(a.tool)}</td>`
          + `<td>${a.ok ? 'ok' : '<span style="color:var(--bad)">failed</span>'}</td><td>${esc(a.device || '')}</td></tr>`).join('')
      : '<tr><td colspan="4" class="muted">No actions yet.</td></tr>';
  }

  function refreshManagement() { refreshPrivacy(); refreshActions(); }

  renderClearChips();

  function tick() { refreshStatus(); refreshMetrics(); refreshRecent(); refreshManagement(); }
  tick();
  setInterval(tick, 10000);
</script>
</body>
</html>
