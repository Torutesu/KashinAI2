<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KashinAI2</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115; color: #e6e9ef;
        display: grid; place-items: center; height: 100vh; margin: 0;
      }
      .box { text-align: center; max-width: 460px; padding: 24px; }
      .spinner {
        width: 28px; height: 28px; margin: 0 auto 16px;
        border: 3px solid #262b36; border-top-color: #4f9eff; border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      h1 { font-size: 18px; margin: 0 0 6px; }
      p { color: #9aa4b2; font-size: 13px; margin: 4px 0; }
      code { color: #e6e9ef; }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="spinner" id="spinner"></div>
      <h1>Starting KashinAI2…</h1>
      <p id="status">Launching the local engine…</p>
    </div>
    <script>
      const PORT = 3001;
      const status = document.getElementById('status');
      async function waitForEngine() {
        for (let i = 0; i < 90; i++) {
          try {
            const r = await fetch(`http://localhost:${PORT}/health`, { cache: 'no-store' });
            if (r.ok) { window.location.href = `http://localhost:${PORT}/`; return; }
          } catch (_) { /* not up yet */ }
          if (i === 5) status.textContent = 'Warming up the model and database…';
          if (i === 30) status.textContent = 'Still starting (first run downloads the embedding model)…';
          await new Promise((res) => setTimeout(res, 1000));
        }
        document.getElementById('spinner').style.display = 'none';
        status.innerHTML =
          'The engine did not start. Please reopen the app; if it keeps failing, ' +
          'check Console.app logs for “KashinAI2”.';
      }
      waitForEngine();
    </script>
  </body>
</html>
