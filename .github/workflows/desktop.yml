name: Desktop (macOS)

# Build the macOS desktop app on a version tag or manual dispatch.
#
# SIGNING + NOTARIZATION are automatic when these repo secrets are set (all
# optional — without them the build still runs, just UNSIGNED):
#   APPLE_CERTIFICATE           base64 of your "Developer ID Application" .p12
#   APPLE_CERTIFICATE_PASSWORD  password for that .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                    your Apple ID email (for notarization)
#   APPLE_PASSWORD              an app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID               your 10-char Team ID
# See desktop/README.md → "Signing & notarization" for how to create these.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      # Import the signing certificate into a temporary keychain (only when a
      # certificate secret is present). The keychain is discarded with the runner.
      - name: Import Apple signing certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        run: |
          KEYCHAIN_PASSWORD="ci-$RANDOM-$RANDOM"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f /tmp/cert.p12

      - name: Install Tauri CLI
        working-directory: desktop
        run: npm install

      - name: Generate app icons
        working-directory: desktop
        run: npm run icon

      # `tauri build` signs when APPLE_SIGNING_IDENTITY is set, and notarizes when
      # APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID are also set. Empty → unsigned.
      - name: Bundle engine + build app
        working-directory: desktop
        run: npm run build
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: KashinAI2-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Attach to release (tags only, best-effort)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" desktop/src-tauri/target/release/bundle/dmg/*.dmg --clobber || true
