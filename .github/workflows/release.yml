name: Release

# Cut a release when a version tag is pushed:
#   git tag -a v1.7.0 -m "v1.7.0" && git push origin v1.7.0
# Produces a GitHub Release (notes from CHANGELOG.md) and a container image
# published to GitHub Container Registry (ghcr.io).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.ver.outputs.tag }} does not match package.json version $PKG"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          # Print the body of the "## [VERSION]" section (up to the next "## [").
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry for $VERSION." > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file release-notes.md

      - name: Log in to ghcr.io
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "$IMAGE:${{ steps.ver.outputs.tag }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ steps.ver.outputs.tag }}"
          docker push "$IMAGE:latest"
